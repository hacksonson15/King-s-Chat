<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <title>King's Chat</title> <script src="https://cdn.jsdelivr.net/npm/appwrite@15.0.0"></script> <style> * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; } body { background: #0f172a; color: white; height: 100vh; overflow: hidden; } .app { display: flex; height: 100vh; } .sidebar { width: 300px; background: #111827; border-right: 1px solid #1f2937; display: flex; flex-direction: column; } .logo { padding: 20px; font-size: 24px; font-weight: bold; background: #1e293b; text-align: center; color: #38bdf8; } .auth-box { padding: 15px; border-bottom: 1px solid #1f2937; } .auth-box input { width: 100%; padding: 10px; margin-bottom: 10px; border: none; border-radius: 8px; background: #1e293b; color: white; } .auth-box button { width: 100%; padding: 10px; border: none; border-radius: 8px; background: #0ea5e9; color: white; font-weight: bold; cursor: pointer; margin-bottom: 10px; } .auth-box button:hover { background: #0284c7; } .user-box { padding: 15px; border-bottom: 1px solid #1f2937; display: none; } .room-list { flex: 1; overflow-y: auto; padding: 10px; } .room { padding: 12px; background: #1e293b; border-radius: 10px; margin-bottom: 10px; cursor: pointer; } .room:hover { background: #334155; } .chat-area { flex: 1; display: flex; flex-direction: column; } .chat-header { padding: 20px; background: #111827; border-bottom: 1px solid #1f2937; font-size: 20px; font-weight: bold; } .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #020617; } .message { background: #1e293b; padding: 12px; border-radius: 12px; max-width: 75%; word-wrap: break-word; } .message.self { background: #0ea5e9; align-self: flex-end; } .message .name { font-size: 12px; margin-bottom: 5px; opacity: 0.8; } .message .time { margin-top: 6px; font-size: 11px; opacity: 0.7; } .chat-input { padding: 15px; display: flex; gap: 10px; background: #111827; border-top: 1px solid #1f2937; } .chat-input input { flex: 1; padding: 12px; border: none; border-radius: 10px; background: #1e293b; color: white; } .chat-input button { padding: 12px 20px; border: none; border-radius: 10px; background: #0ea5e9; color: white; font-weight: bold; cursor: pointer; } .chat-input button:hover { background: #0284c7; } .status { padding: 10px; font-size: 13px; color: #38bdf8; } @media(max-width: 800px) { .sidebar { width: 100%; height: 250px; } .app { flex-direction: column; } } </style> </head> <body> <div class="app"> <div class="sidebar"> <div class="logo"> King's Chat </div> <div class="auth-box" id="authBox"> <input type="text" id="name" placeholder="Full Name"> <input type="email" id="email" placeholder="Email"> <input type="password" id="password" placeholder="Password"> <button onclick="register()">Register</button> <button onclick="login()">Login</button> </div> <div class="user-box" id="userBox"> <h3 id="userName">User</h3> <div class="status" id="status">Online</div> <button onclick="logout()">Logout</button> </div> <div class="room-list"> <div class="room" onclick="switchRoom('global')">🌍 Global Chat</div> <div class="room" onclick="switchRoom('gaming')">🎮 Gaming</div> <div class="room" onclick="switchRoom('music')">🎵 Music</div> <div class="room" onclick="switchRoom('friends')">👥 Friends</div> </div> </div> <div class="chat-area"> <div class="chat-header" id="roomTitle"> 🌍 Global Chat </div> <div class="messages" id="messages"></div> <div class="chat-input"> <input type="text" id="messageInput" placeholder="Type message..."> <button onclick="sendMessage()">Send</button> </div> </div> </div> <script> const client = new Appwrite.Client(); client .setEndpoint('https://fra.cloud.appwrite.io/v1') .setProject('6a14212c00327bbb4ba5'); const account = new Appwrite.Account(client); const databases = new Appwrite.Databases(client); const realtime = new Appwrite.Realtime(client); const DATABASE_ID = '6a14215a0009380c1370'; const COLLECTION_ID = 'messages'; let currentUser = null; let currentRoom = 'global'; let unsubscribe = null; async function register() { const name = document.getElementById('name').value; const email = document.getElementById('email').value; const password = document.getElementById('password').value; try { await account.create( Appwrite.ID.unique(), email, password, name ); alert('Registration successful'); login(); } catch (error) { alert(error.message); } } async function login() { const email = document.getElementById('email').value; const password = document.getElementById('password').value; try { await account.createEmailPasswordSession(email, password); checkUser(); } catch (error) { alert(error.message); } } async function logout() { await account.deleteSession('current'); location.reload(); } async function checkUser() { try { const user = await account.get(); currentUser = user; document.getElementById('authBox').style.display = 'none'; document.getElementById('userBox').style.display = 'block'; document.getElementById('userName').innerText = user.name; loadMessages(); subscribeRealtime(); } catch (error) { console.log('No active session'); } } async function sendMessage() { if (!currentUser) { alert('Login first'); return; } const input = document.getElementById('messageInput'); const text = input.value.trim(); if (!text) return; try { await databases.createDocument( DATABASE_ID, COLLECTION_ID, Appwrite.ID.unique(), { room: currentRoom, message: text, name: currentUser.name, userId: currentUser.$id, createdAt: new Date().toISOString() } ); input.value = ''; } catch (error) { alert(error.message); } } async function loadMessages() { const messagesBox = document.getElementById('messages'); messagesBox.innerHTML = 'Loading...'; try { const response = await databases.listDocuments( DATABASE_ID, COLLECTION_ID, [ Appwrite.Query.equal('room', currentRoom), Appwrite.Query.orderAsc('createdAt'), Appwrite.Query.limit(200) ] ); messagesBox.innerHTML = ''; response.documents.forEach(addMessageToUI); messagesBox.scrollTop = messagesBox.scrollHeight; } catch (error) { messagesBox.innerHTML = 'Failed to load messages'; console.log(error); } } function addMessageToUI(msg) { const messagesBox = document.getElementById('messages'); const div = document.createElement('div'); div.className = 'message'; if (currentUser && msg.userId === currentUser.$id) { div.classList.add('self'); } const time = new Date(msg.createdAt).toLocaleTimeString(); div.innerHTML = ` <div class="name">${msg.name}</div> <div>${escapeHTML(msg.message)}</div> <div class="time">${time}</div> `; messagesBox.appendChild(div); messagesBox.scrollTop = messagesBox.scrollHeight; } function escapeHTML(str) { return str .replace(/&/g, '&amp;') .replace(/</g, '&lt;') .replace(/>/g, '&gt;') .replace(/"/g, '&quot;') .replace(/'/g, '&#039;'); } function switchRoom(room) { currentRoom = room; document.getElementById('roomTitle').innerText = room.toUpperCase() + ' CHAT'; loadMessages(); } function subscribeRealtime() { if (unsubscribe) { unsubscribe(); } unsubscribe = client.subscribe( `databases.${DATABASE_ID}.collections.${COLLECTION_ID}.documents`, response => { if (response.events.includes('databases.*.collections.*.documents.*.create')) { const message = response.payload; if (message.room === currentRoom) { addMessageToUI(message); } } } ); } document.getElementById('messageInput').addEventListener('keypress', e => { if (e.key === 'Enter') { sendMessage(); } }); checkUser(); </script> </body> </html>
