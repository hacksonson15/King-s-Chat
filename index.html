<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatHub - Real-time Messaging</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ============================================ -->
    <!-- INDEX.HTML - Main Entry Point                -->
    <!-- Checks session & redirects to Login or Chat   -->
    <!-- ============================================ -->
    
    <div class="auth-container" id="authSection">
        <div class="auth-box">
            <div class="auth-header">
                <h1><i class="fas fa-comments"></i> ChatHub</h1>
                <p>Connect and chat in real-time</p>
            </div>

            <div class="auth-tabs">
                <a href="login.html" class="auth-tab active">Login</a>
                <a href="signup.html" class="auth-tab">Sign Up</a>
            </div>

            <!-- Quick Login Form (Embedded for convenience) -->
            <div id="quickLoginForm">
                <div id="loginAlert" class="alert"></div>
                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn-primary" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>
                <p style="text-align: center; margin-top: 20px; color: var(--text-light);">
                    Don't have an account? <a href="signup.html" style="color: var(--primary-color);">Sign Up</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Appwrite SDK -->
    <script src="https://cdn.appwrite.io/sdk/v2/client.js"></script>
    
    <!-- Core Configuration -->
    <script src="config.js"></script>
    
    <!-- Auth Functions -->
    <script src="auth.js"></script>

    <script>
        // Check session on page load
        document.addEventListener('DOMContentLoaded', async () => {
            await checkSession();
        });
    </script>
</body>
</html>
