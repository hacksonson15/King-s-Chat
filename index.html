<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realtime Appwrite Chat</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Appwrite Web SDK CDN -->
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar for chat history */
        .chat-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .chat-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.5);
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex flex-col justify-between">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="flex flex-col items-center justify-center flex-grow p-4">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-700">
            <div class="flex flex-col items-center mb-6">
                <div class="bg-indigo-600 p-3 rounded-full mb-3 shadow-lg shadow-indigo-500/30">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">Welcome to AppChat</h1>
                <p class="text-slate-400 text-sm mt-1">Enter a username to join the chatroom</p>
            </div>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-slate-300 mb-1">Username</label>
                    <input type="text" id="username" required autocomplete="off" placeholder="e.g. Alex_99" 
                        class="w-full px-4 py-2.5 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                </div>
                <button type="submit" id="login-btn"
                    class="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-semibold rounded-lg shadow-md transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-slate-800 flex items-center justify-center gap-2">
                    <span>Join Chatroom</span>
                </button>
            </form>
        </div>
    </div>

    <!-- MAIN CHAT APP SCREEN -->
    <div id="chat-screen" class="hidden flex flex-col h-screen max-w-5xl w-full mx-auto shadow-2xl bg-slate-800 border-x border-slate-700">
        <!-- Header -->
        <header class="bg-slate-800/80 backdrop-blur border-b border-slate-700 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <div class="w-10 h-10 bg-indigo-600 rounded-full flex items-center justify-center font-bold text-white shadow-md" id="user-avatar">
                        U
                    </div>
                    <span class="absolute bottom-0 right-0 block h-2.5 w-2.5 rounded-full bg-green-400 ring-2 ring-slate-800"></span>
                </div>
                <div>
                    <h2 class="font-semibold text-slate-200" id="current-username">Username</h2>
                    <p class="text-xs text-green-400 font-medium flex items-center gap-1">
                        Online Room
                    </p>
                </div>
            </div>
            <button id="logout-btn" class="text-slate-400 hover:text-rose-400 text-sm font-medium px-3 py-1.5 rounded-lg hover:bg-slate-700/50 transition-colors">
                Logout
            </button>
        </header>

        <!-- Message Body -->
        <main id="chat-messages" class="flex-grow overflow-y-auto p-6 space-y-4 chat-scrollbar bg-slate-900/40">
            <!-- Loading Box -->
            <div id="loading-box" class="flex flex-col items-center justify-center h-full text-slate-400 gap-2">
                <svg class="animate-spin h-8 w-8 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-sm">Connecting to Appwrite Realtime Server...</p>
            </div>
        </main>

        <!-- Footer Input Bar -->
        <footer class="bg-slate-800 border-t border-slate-700 p-4">
            <form id="message-form" class="flex items-center gap-3">
                <input type="text" id="message-input" autocomplete="off" placeholder="Type a message..." 
                    class="flex-grow bg-slate-700 border border-slate-600 rounded-xl px-4 py-3 text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 p-3 rounded-xl text-white shadow-md transition-colors flex items-center justify-center">
                    <svg class="w-5 h-5 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                </button>
            </form>
        </footer>
    </div>

    <!-- Appwrite Integration Script -->
    <script>
        // --- CONFIGURATION ---
        const APPWRITE_ENDPOINT = "https://fra.cloud.appwrite.io/v1";
        const APPWRITE_PROJECT = "6a14212c00327bbb4ba5";
        const DATABASE_ID = "6a14215a0009380c1370";
        const COLLECTION_ID = "messages"; // Dynamic configuration

        // Initialize Appwrite Web SDK
        const { Client, Account, Databases, ID, Query } = Appwrite;
        const client = new Client();
        client.setEndpoint(APPWRITE_ENDPOINT).setProject(APPWRITE_PROJECT);

        const account = new Account(client);
        const databases = new Databases(client);

        // Elements
        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const loginForm = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const currentUsernameText = document.getElementById('current-username');
        const userAvatar = document.getElementById('user-avatar');
        const chatMessages = document.getElementById('chat-messages');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const logoutBtn = document.getElementById('logout-btn');
        const loadingBox = document.getElementById('loading-box');

        let currentUser = null;

        // Init App Checks
        async function checkSession() {
            try {
                // Check if user has an active session on Appwrite
                await account.get();
                const storedName = localStorage.getItem('chat_user');
                if (storedName) {
                    setupChatroom(storedName);
                } else {
                    showLogin();
                }
            } catch (error) {
                showLogin();
            }
        }

        function showLogin() {
            loginScreen.classList.remove('hidden');
            chatScreen.classList.add('hidden');
        }

        function setupChatroom(username) {
            currentUser = username;
            localStorage.setItem('chat_user', username);
            
            // Set up UI header information
            currentUsernameText.textContent = username;
            userAvatar.textContent = username.substring(0, 2).toUpperCase();

            // Switch Screen
            loginScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');

            // Load Past Messages and Start Realtime listener
            loadPastMessages();
            subscribeToRealtime();
        }

        // Handle Login Submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim();
            if (!username) return;

            const loginBtn = document.getElementById('login-btn');
            loginBtn.disabled = true;
            loginBtn.innerHTML = `<span>Connecting...</span>`;

            try {
                // Create an anonymous session to talk securely with Appwrite backend
                await account.createAnonymousSession();
                setupChatroom(username);
            } catch (error) {
                console.error("Session creation failed", error);
                // If session already exists or error, fall through with local session setup
                setupChatroom(username);
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = `<span>Join Chatroom</span>`;
            }
        });

        // Load Past Documents/Messages
        async function loadPastMessages() {
            try {
                const response = await databases.listDocuments(
                    DATABASE_ID,
                    COLLECTION_ID,
                    [
                        Query.orderAsc('$createdAt'),
                        Query.limit(100)
                    ]
                );
                
                // Clear loading box
                chatMessages.innerHTML = '';
                
                response.documents.forEach(doc => {
                    renderMessage(doc.username, doc.text, doc.$createdAt);
                });
                scrollToBottom();
            } catch (error) {
                console.error("Failed to load documents:", error);
                chatMessages.innerHTML = `
                    <div class="text-center p-6 bg-rose-500/10 border border-rose-500/20 rounded-xl text-rose-300 max-w-md mx-auto mt-10">
                        <p class="font-semibold">Failed to load data or collection not found.</p>
                        <p class="text-xs mt-2 opacity-80">Make sure you have created a collection named <code class="bg-rose-950 px-1 py-0.5 rounded text-white">messages</code> inside your database dashboard, added attributes (<code class="text-white">username</code>, <code class="text-white">text</code>), and set permissions to 'Any' (Create, Read).</p>
                    </div>
                `;
            }
        }

        // Send Message Handler
        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageText = messageInput.value.trim();
            if (!messageText) return;

            messageInput.value = '';

            try {
                await databases.createDocument(
                    DATABASE_ID,
                    COLLECTION_ID,
                    ID.unique(),
                    {
                        username: currentUser,
                        text: messageText
                    }
                );
            } catch (error) {
                console.error("Failed to transmit data:", error);
                alert("Could not send message. Please double check your Appwrite collection permissions settings.");
            }
        });

        // Subscribe to Realtime Updates
        function subscribeToRealtime() {
            const channel = `databases.${DATABASE_ID}.collections.${COLLECTION_ID}.documents`;
            client.subscribe(channel, response => {
                // Listen specifically to creation events
                if (response.events.includes(`${channel}.*.create`)) {
                    const payload = response.payload;
                    renderMessage(payload.username, payload.text, payload.$createdAt);
                    scrollToBottom();
                }
            });
        }

        // Render message cleanly inside the app screen
        function renderMessage(sender, text, timestamp) {
            const isMe = sender === currentUser;
            const msgElement = document.createElement('div');
            msgElement.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-1 animate-fade-in`;

            const timeString = timestamp ? new Date(timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

            msgElement.innerHTML = `
                <div class="max-w-[75%]">
                    ${!isMe ? `<span class="text-xs text-slate-400 font-medium ml-2 mb-1 block">${escapeHtml(sender)}</span>` : ''}
                    <div class="px-4 py-2.5 rounded-2xl text-sm leading-relaxed break-words shadow-sm
                        ${isMe ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-700 text-slate-100 rounded-tl-none'}">
                        ${escapeHtml(text)}
                    </div>
                    <span class="text-[10px] text-slate-500 mt-1 block px-1 ${isMe ? 'text-right' : 'text-left'}">${timeString}</span>
                </div>
            `;
            chatMessages.appendChild(msgElement);
        }

        // Scroll to bottom helper
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Escape HTML to prevent basic XSS injections
        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        // Logout action
        logoutBtn.addEventListener('click', async () => {
            try {
                await account.deleteSession('current');
            } catch(e) {}
            localStorage.removeItem('chat_user');
            currentUser = null;
            showLogin();
        });

        // Run application sequence
        checkSession();
    </script>
</body>
</html>
