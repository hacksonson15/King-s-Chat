<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>King's Chat - Realtime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain; /* Mobile chrome / safari pull-to-refresh pull downs block karne ke liye */
        }
        .chat-scrollbar {
            -webkit-overflow-scrolling: touch;
        }
        .chat-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .chat-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(99, 102, 241, 0.3);
            border-radius: 9999px;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 fixed inset-0 w-full h-full overflow-hidden flex flex-col justify-between">

    <div id="login-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-4 bg-slate-950 overflow-y-auto">
        <div class="bg-slate-900 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-800">
            <div class="flex flex-col items-center mb-8">
                <div class="bg-gradient-to-tr from-indigo-600 to-violet-500 p-4 rounded-2xl mb-4 shadow-xl shadow-indigo-500/20">
                    <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10 2a1 1 0 011 .993v1.323l3.074.879a1 1 0 01.71 1.176l-1.42 5.684a1 1 0 01-.62.71l-2.456.818a1 1 0 01-.576 0l-2.456-.818a1 1 0 01-.62-.71l-1.42-5.684a1 1 0 01.71-1.176L9 4.316V2.993A1 1 0 0110 2z"></path>
                        <path d="M4 11a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1z"></path>
                    </svg>
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-indigo-400 to-violet-400">King's Chat</h1>
                <p class="text-slate-400 text-sm mt-1.5 text-center">Join the royal elite room instantly</p>
            </div>
            
            <form id="login-form" class="space-y-5">
                <div>
                    <label for="username" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Your Username</label>
                    <input type="text" id="username" required autocomplete="off" placeholder="Enter royal moniker..." 
                        class="w-full px-4 py-3 bg-slate-800 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all text-base">
                </div>
                <button type="submit" id="login-btn"
                    class="w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-600/30 transition-all transform active:scale-[0.99] flex items-center justify-center gap-2 text-base">
                    <span>Enter Chatroom</span>
                </button>
            </form>
        </div>
    </div>

    <div id="chat-screen" class="hidden flex flex-col h-[100dvh] w-full max-w-4xl mx-auto bg-slate-900 shadow-2xl relative overflow-hidden">
        
        <header class="bg-slate-900/90 backdrop-blur border-b border-slate-800 px-4 py-3 flex items-center justify-between shrink-0 h-[64px] z-10">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <div class="w-10 h-10 bg-gradient-to-tr from-indigo-600 to-violet-500 rounded-xl flex items-center justify-center font-bold text-white shadow-md uppercase tracking-wider text-sm" id="user-avatar">
                        KC
                    </div>
                    <span class="absolute -bottom-0.5 -right-0.5 block h-3 w-3 rounded-full bg-emerald-500 ring-2 ring-slate-900"></span>
                </div>
                <div>
                    <h2 class="font-bold text-slate-200 leading-tight text-sm md:text-base" id="current-username">Username</h2>
                    <p class="text-[11px] text-emerald-400 font-medium flex items-center gap-1">
                        <span class="w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span> King's Lounge Room
                    </p>
                </div>
            </div>
            <button id="logout-btn" class="text-slate-400 hover:text-rose-400 text-xs font-semibold px-3 py-2 rounded-xl hover:bg-slate-800 transition-colors">
                Exit
            </button>
        </header>

        <main id="chat-messages" class="flex-grow overflow-y-auto p-4 space-y-3 chat-scrollbar bg-slate-950/40">
            <div id="loading-box" class="flex flex-col items-center justify-center h-full text-slate-400 gap-3">
                <svg class="animate-spin h-8 w-8 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-xs tracking-wide">Securing Royal Feed...</p>
            </div>
        </main>

        <footer class="bg-slate-900 border-t border-slate-800 p-3 shrink-0 pb-[calc(12px+env(safe-area-inset-bottom))]">
            <form id="message-form" class="flex items-center gap-2">
                <input type="text" id="message-input" autocomplete="off" placeholder="Write a message to elite..." 
                    class="flex-grow bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all text-base h-[46px]">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 h-[46px] w-[46px] rounded-xl text-white shadow-md transition-colors flex items-center justify-center shrink-0">
                    <svg class="w-5 h-5 transform rotate-90" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                    </svg>
                </button>
            </form>
        </footer>
    </div>

    <script>
        const APPWRITE_ENDPOINT = "https://fra.cloud.appwrite.io/v1";
        const APPWRITE_PROJECT = "6a14212c00327bbb4ba5";
        const DATABASE_ID = "6a14215a0009380c1370";
        const COLLECTION_ID = "messages";

        const { Client, Account, Databases, ID, Query } = Appwrite;
        const client = new Client().setEndpoint(APPWRITE_ENDPOINT).setProject(APPWRITE_PROJECT);
        const account = new Account(client);
        const databases = new Databases(client);

        const loginScreen = document.getElementById('login-screen');
        const chatScreen = document.getElementById('chat-screen');
        const loginForm = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const currentUsernameText = document.getElementById('current-username');
        const userAvatar = document.getElementById('user-avatar');
        const chatMessages = document.getElementById('chat-messages');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const logoutBtn = document.getElementById('logout-btn');

        let currentUser = null;
        let isSubscribed = false;

        async function runInitializationCheck() {
            try {
                await account.get();
                const cacheUser = localStorage.getItem('kings_chat_user');
                if (cacheUser) bootChatroomSession(cacheUser);
                else displayLoginGateway();
            } catch (error) { displayLoginGateway(); }
        }

        function displayLoginGateway() {
            loginScreen.classList.remove('hidden');
            chatScreen.classList.add('hidden');
        }

        function bootChatroomSession(verifiedUsername) {
            currentUser = verifiedUsername;
            localStorage.setItem('kings_chat_user', verifiedUsername);
            currentUsernameText.textContent = verifiedUsername;
            userAvatar.textContent = verifiedUsername.substring(0, 2).toUpperCase();
            loginScreen.classList.add('hidden');
            chatScreen.classList.remove('hidden');

            fetchHistoryStream();
            initializeRealtimeStream();
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const chosenName = usernameInput.value.trim();
            if (!chosenName) return;

            try {
                await account.createAnonymousSession();
                bootChatroomSession(chosenName);
            } catch (err) {
                bootChatroomSession(chosenName);
            }
        });

        async function fetchHistoryStream() {
            try {
                const dataset = await databases.listDocuments(DATABASE_ID, COLLECTION_ID, [Query.orderAsc('$createdAt'), Query.limit(100)]);
                chatMessages.innerHTML = '';
                dataset.documents.forEach(doc => renderMessage(doc.username, doc.text, doc.$createdAt, doc.$id));
                forceScrollAnchor();
            } catch (error) {
                console.error(error);
                chatMessages.innerHTML = `<div class="text-center p-5 text-rose-300 max-w-sm mx-auto mt-12 text-xs">Collection setup incomplete inside Appwrite Dashboard. Ensure 'messages' collection has 'username' and 'text' strings and permissions are public!</div>`;
            }
        }

        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const packetText = messageInput.value.trim();
            if (!packetText) return;
            messageInput.value = '';

            try {
                await databases.createDocument(DATABASE_ID, COLLECTION_ID, ID.unique(), { username: currentUser, text: packetText });
            } catch (error) { alert("Message failure! Check database settings permissions."); }
        });

        function initializeRealtimeStream() {
            if (isSubscribed) return;
            const targetedChannel = `databases.${DATABASE_ID}.collections.${COLLECTION_ID}.documents`;
            
            client.subscribe(targetedChannel, callbackPayload => {
                if (callbackPayload.events.includes(`${targetedChannel}.*.create`)) {
                    const document = callbackPayload.payload;
                    renderMessage(document.username, document.text, document.$createdAt, document.$id);
                    forceScrollAnchor();
                }
            });
            isSubscribed = true;
        }

        function renderMessage(sender, textualContent, systemTimestamp, documentUniqueId) {
            // ANTI-DUPLICATE SECURITY GUARD
            if (documentUniqueId && document.getElementById(`msg-node-${documentUniqueId}`)) {
                return; 
            }

            const isAuthorMe = sender === currentUser;
            const messageWrapperNode = document.createElement('div');
            if (documentUniqueId) messageWrapperNode.id = `msg-node-${documentUniqueId}`;

            messageWrapperNode.className = `flex flex-col ${isAuthorMe ? 'items-end' : 'items-start'} mb-1 w-full`;
            const structuredTime = systemTimestamp ? new Date(systemTimestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

            messageWrapperNode.innerHTML = `
                <div class="max-w-[80%] md:max-w-[70%]">
                    ${!isAuthorMe ? `<span class="text-[11px] text-slate-400 font-semibold ml-2.5 mb-1 block">${sanitizeRawHTML(sender)}</span>` : ''}
                    <div class="px-4 py-2.5 rounded-2xl text-[14px] md:text-[15px] leading-relaxed break-words font-medium
                        ${isAuthorMe ? 'bg-gradient-to-r from-indigo-600 to-indigo-500 text-white rounded-tr-none' : 'bg-slate-800 text-slate-100 rounded-tl-none border border-slate-700/40'}">
                        ${sanitizeRawHTML(textualContent)}
                    </div>
                    <span class="text-[9px] text-slate-500 mt-0.5 block px-1.5 ${isAuthorMe ? 'text-right' : 'text-left'} font-medium">${structuredTime}</span>
                </div>`;
            chatMessages.appendChild(messageWrapperNode);
        }

        function forceScrollAnchor() { chatMessages.scrollTop = chatMessages.scrollHeight; }
        function sanitizeRawHTML(unsafeInputString) {
            return unsafeInputString.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        logoutBtn.addEventListener('click', async () => {
            try { await account.deleteSession('current'); } catch(e) {}
            localStorage.removeItem('kings_chat_user');
            displayLoginGateway();
        });

        runInitializationCheck();
    </script>
</body>
</html>
