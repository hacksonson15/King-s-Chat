<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ChatHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <!-- ============================================ -->
    <!-- LOGIN.HTML - Dedicated Login Page            -->
    <!-- Full login form with validation              -->
    <!-- ============================================ -->
    
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-header">
                <h1><i class="fas fa-sign-in-alt"></i> Welcome Back</h1>
                <p>Sign in to continue to ChatHub</p>
            </div>

            <div id="loginAlert" class="alert"></div>

            <form onsubmit="handleLogin(event)" id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input type="email" id="loginEmail" placeholder="Enter your email address" required autocomplete="email">
                    <small class="form-hint">We'll never share your email</small>
                </div>

                <div class="form-group">
                    <label for="loginPassword">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="loginPassword" placeholder="Enter your password" required minlength="6" autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePasswordVisibility('loginPassword', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                </div>

                <button type="submit" class="btn-primary btn-large" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="social-login">
                <button class="btn-social btn-google" onclick="handleGoogleLogin()">
                    <i class="fab fa-google"></i> Continue with Google
                </button>
                <button class="btn-social btn-github" onclick="handleGithubLogin()">
                    <i class="fab fa-github"></i> Continue with GitHub
                </button>
            </div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Create one now</a></p>
                <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- Appwrite SDK -->
    <script src="https://cdn.appwrite.io/sdk/v2/client.js"></script>
    
    <!-- Core Configuration -->
    <script src="config.js"></script>
    
    <!-- Auth Functions -->
    <script src="auth.js"></script>

    <script>
        // Page-specific login logic
        document.addEventListener('DOMContentLoaded', () => {
            // Check if already logged in
            checkSession();
            
            // Focus on email input
            document.getElementById('loginEmail').focus();
        });

        function togglePasswordVisibility(inputId, button) {
            const input = document.getElementById(inputId);
            const icon = button.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        async function handleGoogleLogin() {
            showToast('Google login coming soon!');
        }

        async function handleGithubLogin() {
            showToast('GitHub login coming soon!');
        }
    </script>
</body>
</html>
